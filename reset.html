<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - IntouchCX</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Nueva Contraseña</h2>
        <form id="formResetPass" class="space-y-4">
            <input type="hidden" id="resetToken">
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña Nueva</label>
                <input type="password" id="newPass" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Confirmar Contraseña</label>
                <input type="password" id="confirmPass" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition-all">
                Actualizar Contraseña
            </button>
        </form>
        <div id="resetMessage" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script src="app.js"></script>
    <script>
        // Capturar el token de la URL automáticamente (?token=...)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (!token) {
            alert("Token no válido. Solicita un nuevo enlace.");
            window.location.href = 'index.html';
        } else {
            document.getElementById('resetToken').value = token;
        }
    </script>
</body>
</html>
