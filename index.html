<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Seguimiento</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuente opcional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <!-- Tabs: Login / Registro -->
        <div class="flex border-b border-gray-200 mb-6">
            <button id="tabLogin" class="flex-1 py-2 text-center font-semibold text-blue-600 border-b-2 border-blue-600">Iniciar Sesión</button>
            <button id="tabRegistro" class="flex-1 py-2 text-center font-semibold text-gray-500 hover:text-gray-700">Registrarse</button>
        </div>

        <!-- FORMULARIO DE LOGIN -->
        <div id="loginFormContainer">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                    <input type="email" id="loginEmail" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="ejemplo@correo.com">
                </div>
                <div>
                    <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="loginPassword" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="••••••••">
                </div>
                <div class="text-right">
                    <a href="#" id="forgotPasswordLink" class="text-sm text-blue-600 hover:underline">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                    Ingresar
                </button>
                <div id="loginMessage" class="text-center text-sm font-medium hidden"></div>
            </form>
        </div>

        <!-- FORMULARIO DE REGISTRO (oculto por defecto) -->
        <div id="registroFormContainer" class="hidden">
            <form id="registroForm" class="space-y-5">
                <div>
                    <label for="regName" class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
                    <input type="text" id="regName" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                        placeholder="Juan Pérez">
                </div>
                <div>
                    <label for="regEmail" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                    <input type="email" id="regEmail" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                        placeholder="ejemplo@correo.com">
                </div>
                <div>
                    <label for="regPassword" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="regPassword" required minlength="6"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                        placeholder="Mínimo 6 caracteres">
                </div>
                <div>
                    <label for="regConfirm" class="block text-sm font-medium text-gray-700 mb-1">Confirmar contraseña</label>
                    <input type="password" id="regConfirm" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                        placeholder="Repite la contraseña">
                </div>
                <button type="submit" id="registroBtn"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                    Crear cuenta
                </button>
                <div id="registroMessage" class="text-center text-sm font-medium hidden"></div>
            </form>
        </div>

        <!-- MODAL PARA RECUPERAR CONTRASEÑA (oculto) -->
        <div id="forgotModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Recuperar contraseña</h3>
                <p class="text-sm text-gray-600 mb-4">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
                <form id="forgotForm">
                    <input type="email" id="forgotEmail" required placeholder="tu@correo.com"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4">
                    <div class="flex justify-end space-x-2">
                        <button type="button" onclick="cerrarForgotModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100">Cancelar</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Enviar</button>
                    </div>
                </form>
                <div id="forgotMessage" class="text-center text-sm font-medium hidden mt-3"></div>
            </div>
        </div>

        <p class="text-xs text-center text-gray-400 mt-6">
            &copy; 2026 IntouchCX. Todos los derechos reservados.
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        // Lógica de pestañas (login/registro)
        const tabLogin = document.getElementById('tabLogin');
        const tabRegistro = document.getElementById('tabRegistro');
        const loginContainer = document.getElementById('loginFormContainer');
        const registroContainer = document.getElementById('registroFormContainer');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
            tabLogin.classList.remove('text-gray-500');
            tabRegistro.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
            tabRegistro.classList.add('text-gray-500');
            loginContainer.classList.remove('hidden');
            registroContainer.classList.add('hidden');
        });

        tabRegistro.addEventListener('click', () => {
            tabRegistro.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
            tabRegistro.classList.remove('text-gray-500');
            tabLogin.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
            tabLogin.classList.add('text-gray-500');
            registroContainer.classList.remove('hidden');
            loginContainer.classList.add('hidden');
        });

        // Modal recuperar contraseña
        const forgotLink = document.getElementById('forgotPasswordLink');
        const forgotModal = document.getElementById('forgotModal');
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            forgotModal.classList.remove('hidden');
        });

        window.cerrarForgotModal = function() {
            forgotModal.classList.add('hidden');
            document.getElementById('forgotForm').reset();
            document.getElementById('forgotMessage').classList.add('hidden');
        };

        // Cerrar modal si se hace clic fuera del contenido (opcional)
        forgotModal.addEventListener('click', (e) => {
            if (e.target === forgotModal) cerrarForgotModal();
        });
    </script>
</body>
</html>
